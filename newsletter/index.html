<body class="alien-side-bg" data-newsletter-root="/newsletter">
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <div class="alien-page-frame">
    <header class="site-header">
      <div class="shell page-head">
        <h1 id="page-title">행정업무 뉴스레터</h1>
        <p class="sub" id="page-subtitle">
          기초 행정부터 복무·계약·징수·지출·예산까지 업무 처리할 때 참고할만한 내용을 이음톡 뉴스레터로 발송드립니다. 
        </p>
      </div>
    </header>

    <main id="main-content" class="page-main page-main--wide page-index">
      <div id="index-loading" class="loading-box">
        데이터 불러오는 중
      </div>

      <div id="index-error" hidden></div>

      <div id="index-render-area" hidden>
        <section class="section">
          <h2>안내 사항</h2>
          <hr />
          <div id="intro-callout"></div>
          <div class="chip-row" id="status-chips" aria-label="페이지 상태"></div>
        </section>

        <nav class="section quick-nav" aria-label="빠른 이동">
          <h2>빠른 이동</h2>
          <hr />
          <div class="chip-row">
            <a class="chip" href="#sec-latest">최근 발행 목록</a>
            <a class="chip" href="#sec-categories">분야별 뉴스레터</a>
            <a class="chip" href="#sec-catalog">전체 발행 목록</a>
          </div>
        </nav>

        <section class="section" id="sec-latest">
          <h2>최근 발행 및 추천 발행물</h2>
          <hr />
          <div id="featured-list" class="tool-grid"></div>
        </section>

        <section class="section" id="sec-categories">
          <h2>분야별 뉴스레터</h2>
          <hr />
          <div id="category-list" class="tool-grid"></div>
        </section>

        <section class="section" id="sec-catalog">
          <h2>전체 기사</h2>
          <p class="muted">·분야별로 등록된 뉴스레터를 한 곳에서 볼 수 있습니다.</p>
          <hr />
          <div id="catalog-groups"></div>
        </section>

        
      </div>
    </main>
  </div>
