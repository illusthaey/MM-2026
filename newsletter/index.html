<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>한 입 행정 FAQ</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B6PE24NSKH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B6PE24NSKH');
  </script>

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="./newsletter-renderer.css" />
  <script src="/static/footer.js"></script>
  <script src="/static/global-loader.js?v=1"></script>
  <script defer src="./scripts/newsletter-common.js"></script>
  <script defer src="./scripts/newsletter-index.js"></script>
</head>

<body class="alien-side-bg" data-newsletter-root="/newsletter">
  <a class="skip-link" href="#main-content">본문 바로가기</a>
    <main id="main-content" class="page-main page-main--xwide page-index">
      
  <div class="alien-page-frame">

        <h1 id="page-title">한 입 크기로 잘라 먹는 행정 업무</h1>
        <p class="sub" id="page-subtitle">
          자주 묻는 질문만 짧게 펼쳐보는 FAQ형 안내 페이지입니다.
        </p>



      <div id="index-loading" class="loading-box">
        FAQ 데이터를 불러오는 중입니다.
      </div>

      <div id="index-error" hidden></div>

      <div id="index-render-area" hidden>
        <section class="section" id="sec-dashboard" aria-labelledby="dashboard-title">
          <div class="row between gap section-heading-wrap">
            <div>
              <h2 id="dashboard-title">대시보드</h2>
              <p class="muted local-tight">·분야별 개수와 전체 흐름을 먼저 확인하는 영역입니다.</p>
            </div>
          </div>
          <hr />

          <div class="faq-dashboard-shell">
            <div class="faq-dashboard-intro">
              <div id="dashboard-intro"></div>
              <div class="chip-row" id="dashboard-status" aria-label="페이지 상태"></div>
            </div>

            <div class="faq-overview-grid" id="overview-stats" aria-label="전체 현황"></div>
            <div class="faq-category-grid" id="dashboard-category-grid" aria-label="분야별 개수"></div>
          </div>
        </section>

        <section class="section" id="sec-all" aria-labelledby="all-title">
          <div class="row between gap section-heading-wrap">
            <div>
              <h2 id="all-title">전체 보기</h2>
              <p class="muted local-tight">·질문 카드를 누르면 답변이 바로 열립니다.</p>
            </div>
          </div>
          <hr />

          <div class="faq-toolbar faq-toolbar--stack">
            <div class="faq-search-box" aria-label="FAQ 키워드 검색">
              <label class="faq-search-label" for="faq-search-input">키워드 검색</label>
              <div class="faq-search-input-row">
                <input
                  id="faq-search-input"
                  class="faq-search-input"
                  type="search"
                  inputmode="search"
                  autocomplete="off"
                  placeholder="예: 성립전예산, 출장, 대체인력"
                />
                <button type="button" class="btn ghost" id="faq-search-clear" hidden>지우기</button>
              </div>
              <p id="faq-search-note" class="faq-filter-note">질문·답변·키워드·관련 문서까지 함께 찾습니다.</p>
            </div>

            <div class="faq-toolbar__bottom">
              <div id="faq-filters" class="faq-filter-row" aria-label="분야 필터"></div>
              <div id="faq-count" class="faq-filter-note" aria-live="polite">전체 FAQ 0개</div>
            </div>
          </div>

          <div id="faq-list" class="faq-list" aria-label="FAQ 목록"></div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
