<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>한 입 행정 FAQ 상세</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B6PE24NSKH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B6PE24NSKH');
  </script>

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="../newsletter-renderer.css" />
  <script src="/static/footer.js"></script>
  <script src="/static/global-loader.js?v=1"></script>
  <script defer src="../scripts/newsletter-common.js"></script>
  <script defer src="../scripts/newsletter-detail.js"></script>
</head>

<body class="alien-side-bg" data-newsletter-root="/newsletter">
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <div class="alien-page-frame">
    <header class="site-header">
      <div class="shell">
        <h1 id="article-title">FAQ 상세</h1>
        <p class="sub" id="article-subtitle">짧은 답변과 관련 문서만 먼저 확인하는 상세 화면입니다.</p>
      </div>
    </header>

    <main class="page-main page-main--narrow" id="main-content">
      <div id="detail-loading" class="loading-box">
        FAQ 데이터를 불러오는 중입니다.
      </div>

      <div id="detail-error" hidden></div>

      <div id="detail-render-area" hidden>
        <div class="page-toolbar article-header-actions">
          <a class="btn ghost" id="btn-back-index" href="/newsletter/index.html">FAQ 대문으로</a>
        </div>

        <p class="muted meta-wrap" id="article-meta"></p>

        <div class="card detail-search-card">
          <h2 class="summary-card-title">페이지 안 검색</h2>
          <hr />
          <div class="faq-search-box" aria-label="상세 페이지 키워드 검색">
            <label class="faq-search-label" for="detail-search-input">키워드 검색</label>
            <div class="faq-search-input-row">
              <input
                id="detail-search-input"
                class="faq-search-input"
                type="search"
                inputmode="search"
                autocomplete="off"
                placeholder="예: 전액 교부, 추경, 사회보험료"
              />
              <button type="button" class="btn ghost" id="detail-search-clear" hidden>지우기</button>
            </div>
            <p id="detail-search-status" class="faq-filter-note">제목·요약·본문·관련 질문까지 한 번에 찾습니다.</p>
          </div>
          <div id="detail-search-empty" class="empty-box detail-search-empty" hidden>
            현재 키워드와 맞는 내용이 없습니다. 다른 표현이나 띄어쓰기를 바꿔 다시 찾아보세요.
          </div>
        </div>

        <div class="card detail-summary-card" id="detail-summary-card">
          <h2 class="summary-card-title">짧게 보는 답변</h2>
          <hr />
          <div id="summary-list"></div>
        </div>

        <nav class="section quick-nav" id="detail-toc-wrap" aria-label="페이지 목차" hidden>
          <h2>페이지 목차</h2>
          <hr />
          <div class="toc">
            <div class="chip-row" id="toc-chips"></div>
          </div>
        </nav>

        <div id="article-sections"></div>

        <section class="section" id="sec-related" hidden>
          <h2>같이 보면 좋은 질문</h2>
          <hr />
          <div id="related-body" class="faq-related-grid"></div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
