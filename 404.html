<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="3; url=/" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light" />
  <title>페이지를 찾을 수 없습니다 — 404</title>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B6PE24NSKH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-B6PE24NSKH');
</script>

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/brand-config.js"></script>
  <script defer src="/static/brand-ui.js"></script>

  <style>
    .page-404 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(24px, 6vw, 64px);
      max-width: var(--w-content);
      margin: 0 auto;
      padding: clamp(64px, 12vh, 128px) var(--page-pad-x);
    }
    .page-404 .err-code {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
      margin: 0 0 var(--space-3);
    }
    .page-404 h1 {
      font-size: var(--fs-2xl);
      letter-spacing: -0.025em;
      margin: 0 0 var(--space-3);
    }
    .page-404 p {
      color: var(--text-secondary);
      margin: 0 0 var(--space-2);
    }
    .page-404 .actions {
      margin-top: var(--space-5);
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .page-404 figure {
      margin: 0;
      width: clamp(160px, 28vw, 280px);
    }
    .page-404 figure img {
      width: 100%;
      height: auto;
      border-radius: var(--r-lg);
    }
    @media (max-width: 720px) {
      .page-404 {
        grid-template-columns: 1fr;
        text-align: left;
      }
      .page-404 figure {
        order: -1;
        width: clamp(120px, 40vw, 200px);
      }
    }
  </style>
  <script>
    // GitHub Pages deep-link fallback: try to send users back to the home
    setTimeout(function(){ if (location.pathname !== '/') location.href = '/'; }, 3000);
  </script>
</head>
<body>
  <main class="page-404">
    <div>
      <p class="err-code">Error 404</p>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>요청하신 주소가 변경되었거나 존재하지 않습니다.</p>
      <p class="muted">잠시 후 자동으로 메인 페이지로 이동합니다.</p>
      <div class="actions">
        <a class="btn primary" href="/">메인으로 이동하기</a>
      </div>
    </div>
    <figure>
      <img src="/static/alien.jpg" alt="고주무관 캐릭터" loading="lazy" />
    </figure>
  </main>
</body>
</html>
