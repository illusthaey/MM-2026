    "desc": "자주 쓰는 참고 지침과 서식을 한 번에 내려받는 묶음 파일입니다.",

    (function () {
      const elGrid = document.getElementById("fileGrid");
      const elQ = document.getElementById("q");
      const elFmt = document.getElementById("fmt");
      const elSort = document.getElementById("sort");
      const elCount = document.getElementById("countPill");

      function safe(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function parseDate(value) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))) return new Date(0);
        return new Date(value + "T00:00:00");
      }

      function matches(item, query) {
        if (!query) return true;
        const haystack = [item.title, item.desc, item.originalName, (item.tags || []).join(" ")].join(" ").toLowerCase();
        return haystack.includes(query.toLowerCase());
      }

      function renderCard(item) {
        const isPdf = String(item.format || "").toUpperCase() === "PDF";
        const tags = (item.tags || []).map(function (tag) {
          return '<span class="pill">#' + safe(tag) + "</span>";
        }).join("");

        return [
          '<article class="tool-card">',
          '  <div class="tool-head">',
          '    <p class="tool-title">' + safe(item.title) + '</p>',
          '    <p class="tool-sub">' + safe(item.desc) + '</p>',
          "  </div>",
          '  <div class="file-meta">',
          '    <span class="pill"><b>' + safe(item.format) + '</b></span>',
          '    <span class="pill">용량: ' + safe(item.size) + "</span>",
          '    <span class="pill">업데이트: ' + safe(item.updated) + "</span>",
          "  </div>",
          '  <p class="tiny">파일명: <span class="muted">' + safe(item.originalName) + "</span></p>",
          '  <div class="file-actions">',
          isPdf ? '    <a class="btn ghost" href="' + safe(item.path) + '" target="_blank" rel="noopener">미리보기</a>' : "",
          '    <a class="btn" href="' + safe(item.path) + '" download>다운로드</a>',
          "  </div>",
          tags ? '  <div class="file-meta" style="margin-top:12px;">' + tags + "</div>" : "",
          "</article>"
        ].join("");
      }

      function render() {
        const query = String(elQ.value || "").trim();
        const format = String(elFmt.value || "").trim().toUpperCase();
        const sort = String(elSort.value || "new").trim();

        let list = FILES
          .filter(function (item) { return matches(item, query); })
          .filter(function (item) {
            return !format || String(item.format || "").toUpperCase() === format;
          });

        if (sort === "name") {
          list.sort(function (a, b) {
            return String(a.title || "").localeCompare(String(b.title || ""), "ko");
          });
        } else if (sort === "old") {
          list.sort(function (a, b) { return parseDate(a.updated) - parseDate(b.updated); });
        } else {
          list.sort(function (a, b) { return parseDate(b.updated) - parseDate(a.updated); });
        }

        elCount.textContent = "총 " + list.length + "건";

        if (!list.length) {
          elGrid.innerHTML = '<div class="empty-box"><p>표시할 파일이 없습니다. 검색어와 필터를 바꿔 보세요.</p></div>';
          return;
        }

        elGrid.innerHTML = list.map(renderCard).join("\n");
      }

      ["input", "change"].forEach(function (eventName) {
        elQ.addEventListener(eventName, render);
        elFmt.addEventListener(eventName, render);
        elSort.addEventListener(eventName, render);
      });

      render();
    })();
  </script>
