<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>각종 서식 다운로드</title>


  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />/>

  <style>
    /* 페이지 전용(최소) */
    .page-top{ margin-bottom: 14px; }

    .page-kicker{
      margin: 0;
      font-size: 1rem;
      color: #555;
      text-align: center;
    }

    .toolbar{
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      margin-top: 14px;
    }

    @media (min-width: 640px){
      .toolbar{ grid-template-columns: 1fr 220px 180px; }
    }

    .toolbar .field{ display: grid; gap: 6px; }
    .toolbar label{ font-weight: 700; color: #111; font-size: 0.98rem; }

    .pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
      font-size: 0.95rem;
      color: #444;
    }

    .file-meta{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .file-actions{
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .file-actions .btn{ margin-left: 0 !important; }

    .empty{
      border: 1px dashed #d4d4d8;
      border-radius: 14px;
      padding: 18px;
      background: #fafafa;
      color: #555;
    }

    .tiny{
      font-size: 0.95rem;
      color: #666;
      margin: 8px 0 0;
    }

    /* 파일명(긴 경우) 줄바꿈 */
    .tool-title{ word-break: break-word; }

    /* 키보드 탐색 시 가시성 */
    a.btn:focus-visible, button.btn:focus-visible{
      outline: 2px solid rgba(17,17,17,0.35);
      outline-offset: 3px;
    }

    /* 한 폴더 구성일 때 안내 배지 */
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #fafafa;
      font-size: .95rem;
      color:#444;
    }
  </style>
</head>

  
  <body>

  <main class="container">
    
    <h2>각종 서식 다운로드</h2>
    <p class="dl-desc">검색창에 필요한 서식을 입력하세요.</p>
    <hr/>
    
    <section class="section dl-section">

      

      <div class="row gap" style="flex-wrap: wrap;">
        <a class="btn" href="/" download>
          zip파일 다운로드
        </a>
        <a class="btn" href="#list">개별 파일 목록으로</a>
      </div>

    <section class="section" id="list">
      <div class="row between" style="align-items: flex-end; gap: 12px;">
        <div>
          <h2>검색창</h2>
          <p class="muted">검색창에 키워드를 입력하십시오. (예시: 스쿨뱅킹 동의서, 행정정보공동이용 동의서 등)</p>
        </div>
        <div class="pill" id="countPill" aria-live="polite">총 0건</div>
      </div>

      <div class="toolbar" role="search">
        <div class="field">
          <label for="q">검색</label>
          <input id="q" type="text" placeholder="예: 예산, 계약제교원, 회계규칙…" autocomplete="off" />
        </div>

        <div class="field">
          <label for="fmt">파일 형식</label>
          <select id="fmt">
            <option value="">전체</option>
            <option value="PDF">PDF</option>
            <option value="HWP">HWP</option>
            <option value="DOCX">DOCX</option>
            <option value="XLSX">XLSX</option>
            <option value="PPTX">PPTX</option>
            <option value="ZIP">ZIP</option>
          </select>
        </div>

        <div class="field">
          <label for="sort">정렬</label>
          <select id="sort">
            <option value="new">최신순</option>
            <option value="old">오래된순</option>
            <option value="name">가나다순</option>
          </select>
        </div>
      </div>

      <hr />

      <div id="fileGrid" class="tool-grid" aria-live="polite"></div>

      <div class="card" style="margin-top: 18px;">
        <p class="muted" style="margin: 0;">
          ⚠️ 브라우저/모바일 환경에 따라 PDF는 ‘다운로드’가 아니라 ‘열기’로 보일 수 있습니다. 그럴 땐 PDF 뷰어의 저장(⬇︎) 버튼 사용하시오. 
        </p>
      </div>
    </section>


  </main>
  <script>
    const FILES = [
      
      {
        title: "행정정보공동이용 동의서",
        format: "HWP",
        size: "4.8MB",
        updated: "2025-12-01",
        path: "/file-download/docs/consent-form-crime-experience.hwp",
        originalName: "consent-form-crime-experience.hwp",
        desc: "범죄경력 조회시 작성하여 행정실에 제출",
        tags: ["범죄경력", "조회", "범죄경력조회", "동의서", "행정정보공동이용", "서식"]
      },
      {
        title: "2026회계 학교행정 업무편람",
        format: "PDF",
        size: "116KB",
        updated: "2026-03-06",
        path: "/file-download/docs/",
        originalName: "",
        desc: "2025년 12월 기준 작성. 학교 행정 전반 업무 절차/참고자료(강원교육청).",
        tags: ["업무편람", "행정", "K-에듀파인"]
      },
      {
        title: "2026년도 학교회계 예산편성 기본지침",
        format: "PDF",
        size: "4.0MB",
        updated: "2026-01-01",
        path: "./2026-school-budget-guideline.pdf",
        originalName: "2026-school-budget-guideline.pdf",
        desc: "2026년도 학교회계 예산편성 기본지침(예산편성 기준/유의사항).",
        tags: ["예산", "학교회계", "지침"]
      },
      {
        title: "2025 계약제교원 운영 지침 (2025.8.)",
        format: "PDF",
        size: "7.0MB",
        updated: "2025-08-01",
        path: "./2025-contract-teacher-guide-2025-08.pdf",
        originalName: "2025-contract-teacher-guide-2025-08.pdf",
        desc: "계약제교원 운영 관련 업무 참고용 지침(2025.8. 버전).",
        tags: ["계약제교원", "인사", "지침"]
      },
      {
        title: "[회계] 공립학교 회계규칙 (강원도)",
        format: "PDF",
        size: "111KB",
        updated: "(원문 기준)",
        path: "./gangwon-public-school-accounting-rules.pdf",
        originalName: "gangwon-public-school-accounting-rules.pdf",
        desc: "공립학교 회계규칙(강원도) 발췌본/자료.",
        tags: ["회계", "규칙"]
      },

      // ZIP 자체도 카드로 노출하고 싶으면 주석 해제
      // {
      //   title: "전체 서식 묶음(eduworkhaey-forms-pack.zip)",
      //   format: "ZIP",
      //   size: "(자동 계산 불가)",
      //   updated: "2026-03-03",
      //   path: "./eduworkhaey-forms-pack.zip",
      //   originalName: "eduworkhaey-forms-pack.zip",
      //   desc: "자주 쓰는 서식/지침 파일을 한 번에 받는 ZIP 묶음.",
      //   tags: ["묶음", "ZIP"]
      // },
    ];

    // -----------------------------
    // 렌더링
    // -----------------------------
    const elGrid = document.getElementById('fileGrid');
    const elQ = document.getElementById('q');
    const elFmt = document.getElementById('fmt');
    const elSort = document.getElementById('sort');
    const elCount = document.getElementById('countPill');

    function safe(s){
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseDate(v){
      // YYYY-MM-DD 형태면 Date로 정렬. 그 외는 아주 과거로 취급.
      if(typeof v !== 'string') return new Date(0);
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return new Date(v + 'T00:00:00');
      if(/^\d{4}-\d{2}-\d{2} /.test(v)) return new Date(v);
      if(/^\d{4}-\d{2}-\d{2}T/.test(v)) return new Date(v);
      return new Date(0);
    }

    function matches(item, q){
      if(!q) return true;
      const hay = [item.title, item.desc, item.originalName, (item.tags||[]).join(' ')].join(' ').toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function cardHTML(item){
      const isPDF = (item.format || '').toUpperCase() === 'PDF';
      const fmt = safe(item.format);
      const title = safe(item.title);
      const desc = safe(item.desc);
      const size = safe(item.size);
      const updated = safe(item.updated);
      const originalName = safe(item.originalName);
      const path = safe(item.path);

      const tags = (item.tags || []).map(t => `<span class="pill">#${safe(t)}</span>`).join(' ');

      return `
        <div class="tool-card">
          <div class="tool-head">
            <p class="tool-title" style="margin:0;">${title}</p>
            <p class="tool-sub" style="margin:6px 0 0;">${desc}</p>
          </div>

          <div class="file-meta">
            <span class="pill"><b>${fmt}</b></span>
            <span class="pill">용량: ${size}</span>
            <span class="pill">업데이트: ${updated}</span>
          </div>

          <p class="tiny">파일명: <span class="muted">${originalName}</span></p>

          <div class="file-actions">
            ${isPDF ? `<a class="btn pastel-blue" href="${path}" target="_blank" rel="noopener">미리보기</a>` : ''}
            <a class="btn pastel-mint" href="${path}" download>다운로드</a>
          </div>

          ${tags ? `<div class="file-meta" style="margin-top:12px;">${tags}</div>` : ''}
        </div>
      `.trim();
    }

    function render(){
      const q = (elQ.value || '').trim();
      const fmt = (elFmt.value || '').trim().toUpperCase();
      const sort = (elSort.value || 'new');

      let list = FILES
        .filter(x => matches(x, q))
        .filter(x => !fmt || String(x.format||'').toUpperCase() === fmt);

      if(sort === 'name'){
        list.sort((a,b) => String(a.title||'').localeCompare(String(b.title||''), 'ko'));
      }else if(sort === 'old'){
        list.sort((a,b) => parseDate(a.updated) - parseDate(b.updated));
      }else{
        list.sort((a,b) => parseDate(b.updated) - parseDate(a.updated));
      }

      if(elCount) elCount.textContent = `총 ${list.length}건`;

      if(list.length === 0){
        elGrid.innerHTML = `
          <div class="empty">
            <b>표시할 파일이 없습니다.</b><br/>
            검색어/필터를 바꿔보세요.
          </div>
        `;
        return;
      }

      elGrid.innerHTML = list.map(cardHTML).join('\n');
    }

    // 이벤트 바인딩
    ['input','change'].forEach(evt => {
      elQ.addEventListener(evt, render);
      elFmt.addEventListener(evt, render);
      elSort.addEventListener(evt, render);
    });

    // 최초 렌더
    render();
  </script>

    <script src="/static/footer.js"></script>
<script src="/static/global-loader.js?v=1"></script>

    
</body>
</html>
